<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    :root { --bg-color: #fafafa; --card-bg: #ffffff; --text-main: #0f172a; --text-muted: #64748b; --accent: #2563eb; --accent-light: #eff6ff; --border: #e2e8f0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); color: var(--text-main); line-height: 1.7; }
    
    .navbar { position: sticky; top: 0; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); z-index: 1000; padding: 1.2rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 2.5rem; }
    .navbar a { text-decoration: none; color: var(--text-main); font-weight: 600; font-size: 0.95rem; transition: color 0.2s; text-transform: uppercase; letter-spacing: 0.05em; }
    .navbar a:hover { color: var(--accent); }
    .navbar a.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 2px; }

    .container { max-width: 1050px; margin: 3rem auto; padding: 0 1.5rem; }
    
    /* Post Styles */
    .article-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 3rem; margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); max-width: 850px; margin-left: auto; margin-right: auto;}
    .article-date { font-size: 0.85rem; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; display: block; }
    .article-card h1 { font-size: 2.2rem; line-height: 1.2; margin-bottom: 1.5rem; font-weight: 800; color: #0f172a; }
    .article-card h2, .article-card h3 { font-size: 1.3rem; margin: 2rem 0 1rem 0; font-weight: 700; color: #1e293b; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;}
    .article-card p { margin-bottom: 1.2rem; font-size: 1.05rem; color: #334155; }
    .article-card strong { color: #0f172a; font-weight: 700; }
    .article-card ol, .article-card ul { margin-bottom: 1.5rem; padding-left: 1.5rem; font-size: 1.05rem; color: #334155; }
    
    /* Code Blocks */
    pre { background: #0f172a; color: #f8fafc; padding: 1.2rem; border-radius: 8px; overflow-x: auto; margin: 1.5rem 0; font-size: 0.95rem; line-height: 1.5; border: 1px solid #334155; }
    code { font-family: "SFMono-Regular", Consolas, monospace; }

    @media (max-width: 768px) { 
      .navbar { padding: 1rem 0.5rem; gap: 0.8rem; flex-wrap: wrap; justify-content: center; } 
      .navbar a { font-size: 0.8rem; letter-spacing: 0.02em; }
      .article-card { padding: 1.5rem; }
      .article-card h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
<nav class="navbar">
    <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' or page.url == '/index.html' %}active{% endif %}">Blog</a>
    <a href="{{ '/news.html' | relative_url }}" class="{% if page.url contains 'news' %}active{% endif %}">News</a>
    <a href="{{ '/about.html' | relative_url }}" class="{% if page.url contains 'about' %}active{% endif %}">About Me</a>
  </nav>

  <!-- This magic tag injects your content into this frame -->
  {{ content }}

</body>
</html>
